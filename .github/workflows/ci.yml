name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4']
      fail-fast: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, intl, pdo_pgsql, pgsql, redis, mbstring, fileinfo, openssl, curl, zip, gd, pcntl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Configure DB connection
        run: |
          sed -i 's/DB_DATABASE=erp/DB_DATABASE=erp_test/' .env
          sed -i 's/DB_USERNAME=postgres/DB_USERNAME=erp/' .env
          sed -i 's/^DB_PASSWORD=$/DB_PASSWORD=erp/' .env

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (level 8)
        run: vendor/bin/phpstan analyse --memory-limit=2G --no-progress

      - name: Migrate
        run: php artisan migrate --force

      - name: Pest
        run: vendor/bin/pest --parallel
